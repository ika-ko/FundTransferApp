services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    volumes:
      - sqlserver-data:/var/opt/mssql
    # Not published to the host on purpose: the API reaches it over the
    # compose network, and this avoids clashing with any local SQL Server
    # already using port 1433.
    healthcheck:
      # sqlcmd lives in mssql-tools18 on current 2022 images (needs -C to
      # trust the self-signed cert) and in mssql-tools on older ones.
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -C -Q 'SELECT 1' -b -o /dev/null || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -Q 'SELECT 1' -b -o /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build: ./FundTransfer.Api
    environment:
      # Overrides ConnectionStrings:DefaultConnection from appsettings.json
      # to target the sqlserver service instead of localhost.
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=FundTransferDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      # Enables Swagger UI at http://localhost:8080/swagger for convenience.
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  web:
    build:
      context: ./fundtransfer-web
      args:
        # Baked into the JS bundle at build time. The browser (on the host)
        # calls the API through its published port, hence localhost:8080.
        VITE_API_URL: "http://localhost:8080"
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  sqlserver-data:
